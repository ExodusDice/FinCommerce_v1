<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register an account on FinCommerce to connect your Shopee, Lazada, and TikTok shop fronts in Thailand. Manage inventory and pricing from a single dashboard.">
  <title>Register | FinCommerce - Multi-Channel Thailand E-Commerce Merchant SaaS</title>
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <h1>FinCommerce</h1>
    <p>Thailand Multi-Channel E-Commerce Integration Suite</p>
  </header>

  <!-- Main Register Container -->
  <main class="main-container">
    
    <!-- Registration Card -->
    <section class="glass-card" id="register-card">
      <h2 class="card-title">Create Merchant Account</h2>
      
      <form id="register-form">
        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname" class="form-label">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="fullname" class="form-input" placeholder="Somchai Prasert" required>
          </div>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="reg-email" class="form-input" placeholder="somchai@gmail.com" required>
          </div>
          <span id="reg-email-error" class="feedback-msg"></span>
        </div>

        <!-- Thailand Mobile Number -->
        <div class="form-group">
          <label for="reg-phone" class="form-label">Mobile Number</label>
          <div class="input-wrapper">
            <input type="tel" id="reg-phone" class="form-input" placeholder="08XXXXXXXX" required>
          </div>
          <span id="reg-phone-error" class="feedback-msg"></span>
          <span style="font-size: 0.75rem; color: var(--color-text-muted); display: block; margin-top: 0.25rem;">
            Tip: Prioritizing mobile registration is crucial for high regional user conversions.
          </span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="reg-password" class="form-label">Password</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required>
          </div>
          <!-- Strength Visual Progress Meter -->
          <div class="pwd-strength-container" id="reg-pwd-strength-container">
            <div class="pwd-strength-bar" id="reg-pwd-strength-bar"></div>
          </div>
          <!-- Strength text details -->
          <span id="pwd-strength-msg" class="feedback-msg"></span>
          <span id="pwd-leak-msg" class="feedback-msg"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="reg-password-confirm" class="form-label">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="reg-password-confirm" class="form-input" placeholder="••••••••" required>
          </div>
          <span id="pwd-confirm-error" class="feedback-msg"></span>
        </div>

        <!-- Terms and Conditions checkbox -->
        <div class="form-footer" style="justify-content: flex-start;">
          <label class="checkbox-container">
            <input type="checkbox" required>
            <span class="checkmark"></span>
            I agree to the Terms of Service & Privacy Policy
          </label>
        </div>

        <!-- Register Action -->
        <button type="submit" id="reg-btn" class="btn btn-primary">Create Account</button>
      </form>

      <div class="divider">Or Register With</div>

      <!-- Social Sign Ups (Google, Facebook, TikTok with inline SVGs) -->
      <div class="social-grid">
        <button type="button" class="social-btn google" data-provider="google" title="Register with Google">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
          </svg>
        </button>
        <button type="button" class="social-btn facebook" data-provider="facebook" title="Register with Facebook">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </button>
        <button type="button" class="social-btn tiktok" data-provider="tiktok" title="Register with TikTok">
          <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="#FFFFFF">
            <path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.07-2.88-.54-4.05-1.4-1.17-.86-1.96-2.18-2.22-3.61-.02 2.44-.01 4.88-.01 7.32 0 1.36-.27 2.77-.92 3.98-.65 1.21-1.68 2.2-2.91 2.77-1.23.57-2.65.77-3.99.57-1.34-.2-2.62-.89-3.56-1.87S3.2 15.22 3.04 13.88c-.16-1.34.02-2.76.57-3.99s1.51-2.28 2.72-2.92c1.21-.64 2.62-.91 3.98-.9v4.14c-1.07-.02-2.18.23-3.06.87-.88.64-1.42 1.7-1.46 2.8-.04 1.1.4 2.22 1.2 2.94.8.72 1.95 1.05 3.01.91 1.06-.14 2.01-.83 2.48-1.79.47-.96.55-2.09.55-3.15V.02h.1z"/>
          </svg>
        </button>
      </div>

      <p style="text-align: center; font-size: 0.9rem; color: var(--color-text-muted); margin-top: 1.5rem;">
        Already registered? <a href="index.html" class="forgot-link">Sign In here</a>
      </p>
    </section>

  </main>

  <!-- Script Injection -->
  <script src="app.js"></script>
</body>
</html>
