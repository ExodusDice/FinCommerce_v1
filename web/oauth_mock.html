<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Account | Identity Center</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    .oauth-box {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      text-align: center;
      border: 1px solid #e5e7eb;
    }
    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .brand-name {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .brand-desc {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }
    .profile-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      transition: all 0.2s ease;
      text-align: left;
      margin-bottom: 0.75rem;
    }
    .profile-card:hover {
      background: #f9fafb;
      border-color: #d1d5db;
      transform: translateY(-1px);
    }
    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #3b82f6;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: bold;
    }
    .profile-info h4 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .profile-info p {
      margin: 0;
      font-size: 0.8rem;
      color: #6b7280;
    }
    .cancel-btn {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.875rem;
      margin-top: 1.5rem;
      transition: color 0.2s ease;
    }
    .cancel-btn:hover {
      color: #4b5563;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="oauth-box">
    <div id="brand-logo" class="brand-logo"></div>
    <div id="brand-name" class="brand-name">Sign In</div>
    <div class="brand-desc">to continue to <strong>FinCommerce</strong></div>
    
    <div id="profiles-container">
      <!-- Generated profiles go here -->
    </div>
    
    <button class="cancel-btn" onclick="window.close()">Cancel and return to FinCommerce</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const provider = urlParams.get('provider') || 'google';
    
    const brandLogo = document.getElementById('brand-logo');
    const brandName = document.getElementById('brand-name');
    const profilesContainer = document.getElementById('profiles-container');
    
    const providerConfig = {
      google: { 
        logo: `<svg viewBox="0 0 24 24" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>`, 
        name: 'Google Account', bg: '#ea4335' 
      },
      facebook: { 
        logo: `<svg viewBox="0 0 24 24" width="40" height="40" xmlns="http://www.w3.org/2000/svg" fill="#1877F2">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>`, 
        name: 'Facebook Connect', bg: '#1877f2' 
      },
      tiktok: { 
        logo: `<svg viewBox="0 0 24 24" width="40" height="40" xmlns="http://www.w3.org/2000/svg" fill="#000000">
              <path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.07-2.88-.54-4.05-1.4-1.17-.86-1.96-2.18-2.22-3.61-.02 2.44-.01 4.88-.01 7.32 0 1.36-.27 2.77-.92 3.98-.65 1.21-1.68 2.2-2.91 2.77-1.23.57-2.65.77-3.99.57-1.34-.2-2.62-.89-3.56-1.87S3.2 15.22 3.04 13.88c-.16-1.34.02-2.76.57-3.99s1.51-2.28 2.72-2.92c1.21-.64 2.62-.91 3.98-.9v4.14c-1.07-.02-2.18.23-3.06.87-.88.64-1.42 1.7-1.46 2.8-.04 1.1.4 2.22 1.2 2.94.8.72 1.95 1.05 3.01.91 1.06-.14 2.01-.83 2.48-1.79.47-.96.55-2.09.55-3.15V.02h.1z"/>
            </svg>`, 
        name: 'TikTok Partner', bg: '#010101' 
      }
    };
    
    const config = providerConfig[provider] || providerConfig.google;
    
    brandLogo.innerHTML = config.logo;
    brandName.textContent = `Sign in via ${config.name}`;
    
    const mockProfiles = [
      { name: 'Somchai Prasert', email: 'somchai@gmail.com', avatar: 'S' },
      { name: 'Wichai Dev', email: 'wichai.development@outlook.co.th', avatar: 'W' }
    ];
    
    mockProfiles.forEach(profile => {
      const card = document.createElement('div');
      card.className = 'profile-card';
      
      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'profile-avatar';
      avatarDiv.style.backgroundColor = config.bg;
      avatarDiv.textContent = profile.avatar;
      
      const infoDiv = document.createElement('div');
      infoDiv.className = 'profile-info';
      infoDiv.innerHTML = `
        <h4>${profile.name}</h4>
        <p>${profile.email}</p>
      `;
      
      card.appendChild(avatarDiv);
      card.appendChild(infoDiv);
      
      card.addEventListener('click', () => {
        if (window.opener) {
          window.opener.postMessage({
            status: 'SUCCESS',
            provider: provider,
            name: profile.name,
            email: profile.email
          }, '*');
        }
        window.close();
      });
      
      profilesContainer.appendChild(card);
    });
  </script>
</body>
</html>
